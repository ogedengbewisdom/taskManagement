<div class="auth-screen">

    <div class="auth-card">

        <div class="auth-brand">
            <div class="brand-icon">
                <span class="material-symbols-rounded">task_alt</span>
            </div>
            <h1 class="brand-name">TaskSpace</h1>
        </div>

        <div class="auth-header">
            <h2>Forgot Password</h2>
            <p>Enter your email to reset your password</p>
        </div>

        <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="auth-form" novalidate>

            <app-input-text [formGroup]="forgotPasswordForm" name="email" label="Email" type="email"
                placeholder="Enter your email" [errorMessage]="errorMessage('email')" [hasError]="hasError('email')" />

            <app-button label="Send Reset Link" variant="primary" [fullWidth]="true" size="md" type="submit"
                [isLoading]="isLoading()" [disabled]="forgotPasswordForm.invalid || isLoading()" />

        </form>


        <p class="auth-footer">
            Remember your password?
            <a routerLink="/auth/login" class="auth-link">Sign in</a>
        </p>

    </div>

</div>
