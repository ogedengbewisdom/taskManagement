<div class="auth-screen">

    <div class="auth-card">

        <div class="auth-brand">
            <div class="brand-icon">
                <span class="material-symbols-rounded">task_alt</span>
            </div>
            <h1 class="brand-name">TaskSpace</h1>
        </div>

        <div class="auth-header">
            <h2>Reset Password</h2>
            <p>Enter your new password and confirm it</p>
        </div>

        <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="auth-form" novalidate>

            <app-password-input [formGroup]="resetPasswordForm" name="password" label="Password"
                placeholder="Enter your password" [errorMessage]="errorMessage('password')"
                [hasError]="hasError('password')" />

            <app-password-input [formGroup]="resetPasswordForm" name="confirmPassword" label="Confirm Password"
                placeholder="Confirm your password" [errorMessage]="errorMessage('confirmPassword')"
                [hasError]="hasError('confirmPassword')" />

            <app-button label="Reset Password" variant="primary" [fullWidth]="true" size="md" type="submit"
                [isLoading]="isLoading()" [disabled]="resetPasswordForm.invalid || isLoading()" />

        </form>


        <p class="auth-footer">
            Remember your password?
            <a routerLink="/auth/login" class="auth-link">Sign in</a>
        </p>

    </div>

</div>
