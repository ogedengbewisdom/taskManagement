<div class="task-form-view">

    <header class="task-form-header">
        <div class="task-form-header-content">

            <button class="header-action" (click)="goBack()">
                Cancel
            </button>

            <h1>New Task</h1>

            <button class="header-action primary" type="button" (click)="onSubmit()">
                Create
            </button>
        </div>
    </header>

    <form [formGroup]="taskForm" class="task-form">
        <app-text-input [formGroup]="taskForm" name="title" label="" placeholder="Task Title..."
            [errorMessage]="errorMessage('title')" [hasError]="hasError('title')">
        </app-text-input>

        <app-text-area [formGroup]="taskForm" name="description" label="" placeholder="Add description..."
            [errorMessage]="errorMessage('description')" [hasError]="hasError('description')">
        </app-text-area>

        <app-assignee-selector [invitees]="invitees" [(selectedUsers)]="selectedUsers" />


        <app-date-input [showChevron]="true" [formGroup]="taskForm" name="dueDate" label="DUE DATE" [minDate]="today"
            [errorMessage]="errorMessage('dueDate')" [hasError]="hasError('dueDate')" />

        <app-select-status formControlName="status" [boardName]="boardName()" name="status" label="BOARD"
            [errorMessage]="errorMessage('status')" [hasError]="hasError('status')" [options]="options" />

        <div class="divider"></div>

        <section class="task-section">

            <div class="section-header" (click)="addChecklistItem()">
                <div class="section-header-left">
                    <svg width="20" height="16" viewBox="0 0 20 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M3.55 15.075L0 11.525L1.4 10.125L3.525 12.25L7.775 8L9.175 9.425L3.55 15.075ZM3.55 7.075L0 3.525L1.4 2.125L3.525 4.25L7.775 0L9.175 1.425L3.55 7.075ZM11 13.075V11.075H20V13.075H11ZM11 5.075V3.075H20V5.075H11Z"
                            fill="#6B7280" />
                    </svg>
                    <h3>Add To Checklist</h3>
                </div>

                <button type="button" class="add-btn">

                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 8H0V6H6V0H8V6H14V8H8V14H6V8Z" fill="#9CA3AF" />
                    </svg>


                </button>
            </div>

            <div formArrayName="checklist" class="checklist-wrapper">

                @for(item of checklist.controls; track $index) {

                <div class="checklist-item" [formGroupName]="$index">

                    <input type="text" formControlName="label" placeholder="Checklist item..." class="text-input"
                        [class.error]="item.get('label')?.invalid && item.get('label')?.touched">

                    <button type="button" class="remove-btn" (click)="removeChecklistItem($index)">
                        <span class="material-symbols-rounded">
                            remove
                        </span>
                    </button>

                </div>

                @if(item.get('label')?.invalid && item.get('label')?.touched) {
                <p class="error-message">
                    Checklist item is required.
                </p>
                }

                }

            </div>

        </section>
