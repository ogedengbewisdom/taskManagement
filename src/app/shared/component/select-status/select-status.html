<div class="select-wrapper" (clickOutside)="closeDropdown()">

    @if(label) {
    <label>{{ label }}</label>
    }

    <div class="select-chip" [class.error]="hasError" [class.open]="isOpen" (click)="toggleDropdown()">

        <div class="select-content">

            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M10 6V0H18V6H10ZM0 10V0H8V10H0ZM10 18V8H18V18H10ZM0 18V12H8V18H0ZM2 8H6V2H2V8ZM12 16H16V10H12V16ZM12 4H16V2H12V4ZM2 16H6V14H2V16Z"
                    fill="#6B7280" />
            </svg>


            <span class="select-value" [class.placeholder]="!selectedLabel">

                @if(selectedLabel) {
                {{ (boardName + ' > ' + selectedLabel) }}
                } @else {
                {{ placeholder }}
                }

            </span>

        </div>

        <svg class="chevron" width="14" height="9" viewBox="0 0 14 9" xmlns="http://www.w3.org/2000/svg">

            <path d="M1 1L7 7L13 1" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

        </svg>

    </div>

    @if(isOpen) {

    <ul class="options">

        @for(option of options; track option.value) {

        <li class="option" [class.selected]="option.value === value" (click)="selectOption(option)">

            {{ option.label }}

        </li>

        }

    </ul>

    }

    @if(hasError) {
    <p class="error-text">
        {{ errorMessage }}
    </p>
    }

</div>
