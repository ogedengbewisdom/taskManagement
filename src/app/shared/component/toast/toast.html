@let toast = toast$ | async;

<div class="toast-container" [class.none]="toast?.status === null">
    <article class="toast" [class.success]="toast?.status === 'success'" [class.error]="toast?.status === 'error'"
        [class.pending]="toast?.status === 'pending'">

        <div class="toast-header">
            <span class="toast-header-status">
                {{ toast?.statusCode }} {{ toast?.status }}
            </span>
            <button class="toast-close" (click)="toastService.clearToast()">✕</button>
        </div>
        <span class="toast-message">{{ toast?.message }}</span>

    </article>
</div>
