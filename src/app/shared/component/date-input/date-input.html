<div [formGroup]="formGroup" class="date-input-wrapper">
    <label>{{ label }}</label>
    <div class="date-chip" [class.error]="hasError" (click)="openDatePicker()">

        <svg width="18" height="20" viewBox="0 0 18 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M2 20C1.45 20 0.979167 19.8042 0.5875 19.4125C0.195833 19.0208 0 18.55 0 18V4C0 3.45 0.195833 2.97917 0.5875 2.5875C0.979167 2.19583 1.45 2 2 2H3V0H5V2H13V0H15V2H16C16.55 2 17.0208 2.19583 17.4125 2.5875C17.8042 2.97917 18 3.45 18 4V18C18 18.55 17.8042 19.0208 17.4125 19.4125C17.0208 19.8042 16.55 20 16 20H2ZM2 18H16V8H2V18ZM2 6H16V4H2V6ZM2 6V4V6Z"
                fill="#6B7280" />
        </svg>


        <div class="date-value">
            @if(formGroup.get(name)?.value) {
            <span>
                {{ formGroup.get(name)?.value | date:'MMM d, yyyy' }}
            </span>
            } @else {
            <span class="placeholder">
                Select date
            </span>
            }
        </div>

        @if(showChevron) {
        <svg class="date-chevron" width="8" height="12" viewBox="0 0 8 12" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M4.6 6L0 1.4L1.4 0L7.4 6L1.4 12L0 10.6L4.6 6Z" fill="#9CA3AF" />
        </svg>
        }

        <input #dateInput type="date" [formControlName]="name" class="hidden-date-input" [min]="minDate" [max]="maxDate">

    </div>

    @if(hasError) {
    <p class="error-text">
        {{ errorMessage }}
    </p>
    }

</div>
