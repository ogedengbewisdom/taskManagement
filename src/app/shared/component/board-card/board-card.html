<article class="board-card" (click)="onClick.emit()" role="button" tabindex="0">
    <div class="board-card-content">
      <h3>{{ board.boardName }}</h3>
  
      @if (isOwner) {
        <div class="card-actions">
          <button class="edit-btn" (click)="onEditClick($event)" aria-label="Edit board">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.25 12.9375V15.75H5.0625L13.3562 7.45625L10.5437 4.64375L2.25 12.9375ZM15.5312 5.28125C15.825 4.9875 15.825 4.5125 15.5312 4.21875L13.7812 2.46875C13.4875 2.175 13.0125 2.175 12.7188 2.46875L11.35 3.8375L14.1625 6.65L15.5312 5.28125Z" fill="#6B7280" />
            </svg>
          </button>
  
          <button
            class="archive-btn"
            (click)="onArchiveClick($event)"
            [attr.aria-label]="board.status === 'archived' ? 'Unarchive board' : 'Archive board'"
          >
            @if (board.status === 'archived') {
              <span class="material-symbols-rounded">unarchive</span>
            } @else {
              <span class="material-symbols-rounded">archive</span>
            }
          </button>
        </div>
      }
    </div>
  
    <div class="board-meta">
      <span>{{ totalTasks }} Tasks</span>
      <span>{{ progress }}% Complete</span>
    </div>
  
    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progress"></div>
    </div>
  </article>
